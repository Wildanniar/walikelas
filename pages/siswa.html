<div class="container-fluid">

    <!-- Judul Halaman -->
    <h1 class="h3 mb-4 text-gray-800">
        Data Siswa
    </h1>

    <p class="mb-4">
        Kelola seluruh data siswa pada kelas yang diampu.
    </p>

    <!-- Card -->
    <div class="card shadow mb-4">

        <div class="card-header py-3 d-flex justify-content-between align-items-center">

            <h6 class="m-0 font-weight-bold text-primary">
                Daftar Siswa
            </h6>

            <button class="btn btn-primary" onclick="tambahBaru()">
                <i class="fas fa-plus"></i>
                Tambah Siswa
            </button>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover" id="tableSiswa" width="100%" cellspacing="0">

                    <thead class="thead-light">

                        <tr>

                            <th width="50">No</th>
                            <th>NIS</th>
                            <th>Nama</th>
                            <th>JK</th>
                            <th>Kelas</th>
                            <th>Alamat</th>
                            <th>No HP</th>
                            <th width="120">Aksi</th>

                        </tr>

                    </thead>

                    <tbody>

                        <!-- Diisi oleh JavaScript -->

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- ===========================
     Modal Tambah / Edit Siswa
============================ -->

<div class="modal fade" id="modalSiswa" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="modalTitle">
                    Tambah Data Siswa
                </h5>

                <button type="button" class="close" data-dismiss="modal">

                    <span>&times;</span>

                </button>

            </div>

            <div class="modal-body">

                <input type="hidden" id="id">

                <div class="form-row">

                    <div class="form-group col-md-6">

                        <label>NIS</label>

                        <input
                            type="text"
                            class="form-control"
                            id="nis"
                            placeholder="Masukkan NIS">

                    </div>

                    <div class="form-group col-md-6">

                        <label>Nama</label>

                        <input
                            type="text"
                            class="form-control"
                            id="nama"
                            placeholder="Masukkan Nama">

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group col-md-4">

                        <label>Jenis Kelamin</label>

                        <select class="form-control" id="jk">

                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>

                        </select>

                    </div>

                    <div class="form-group col-md-4">

                        <label>Kelas</label>

                        <input
                            type="text"
                            class="form-control"
                            id="kelas"
                            placeholder="Contoh: XI TAV 1">

                    </div>

                    <div class="form-group col-md-4">

                        <label>No HP</label>

                        <input
                            type="text"
                            class="form-control"
                            id="no_hp"
                            placeholder="08xxxxxxxxxx">

                    </div>

                </div>

                <div class="form-group">

                    <label>Alamat</label>

                    <textarea
                        class="form-control"
                        id="alamat"
                        rows="3"
                        placeholder="Masukkan Alamat"></textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-dismiss="modal">

                    Batal

                </button>

                <button
                    class="btn btn-primary"
                    id="btnSimpan">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>
